<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LIVE ARENA™ — Core 7.1 Game Engine</title>
<link rel="stylesheet" href="assets/css/core7.css">
</head>
<body>
<div class="arena" id="arena">
  <header class="top">
    <div><b>SESSION #A7F3-29</b><small>EP.001 — THE AWAKENING</small></div>
    <h1>LIVE ARENA™<small>CORE 7.1 GAME ENGINE</small></h1>
    <div class="phase">BOSS PHASE <b id="bossPhase">SLEEPING</b></div>
  </header>

  <main class="grid">
    <aside class="panel stats">
      <div>❤️ Likes <b id="likes">0</b></div>
      <div>🎁 Gifts <b id="gifts">0</b></div>
      <div>👥 Viewers <b id="viewers">0</b></div>
      <div>🔥 Combo <b id="combo">x0</b></div>
      <div>⚡ Energy <b id="energy">0%</b></div>
    </aside>

    <section class="stage">
      <div class="arena-master">
        <div class="hood"></div>
        <div class="mask"><i></i><i></i></div>
      </div>

      <div class="boss" id="boss">
        <div class="boss-name">BOSS DA ARENA</div>
        <div class="boss-bar"><span id="bossHpBar"></span></div>
        <div class="boss-hp" id="bossHp">100%</div>
      </div>

      <div class="event-banner" id="eventBanner">ARENA READY</div>
    </section>

    <aside class="panel director">
      <h3>🤖 AI DIRECTOR</h3>
      <p id="ai">A Arena está estável.</p>
      <h3>🎯 MISSÃO</h3>
      <p id="mission">Carregar energia até 100%.</p>
      <h3>📜 EVENT LOG</h3>
      <div id="log" class="log"></div>
    </aside>
  </main>

  <section class="controls">
    <button onclick="LiveArena.event('like')">❤️ Like</button>
    <button onclick="LiveArena.event('gift')">🎁 Gift</button>
    <button onclick="LiveArena.event('comment')">💬 Chat</button>
    <button onclick="LiveArena.event('boss')">⚠ Spawn Boss</button>
    <button onclick="LiveArena.event('attack')">⚔ Attack Boss</button>
    <button onclick="LiveArena.event('random')">🌌 Random Event</button>
  </section>

  <div class="toast" id="toast">ONLINE</div>
</div>

<script type="module" src="engine/core7-engine.js"></script>
</body>
</html>
