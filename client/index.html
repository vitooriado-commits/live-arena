<!DOCTYPE html><html lang="pt-PT"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>LIVE ARENA Core 10.3</title><link rel="stylesheet" href="assets/css/app.css"></head><body>
<div class="arena"><header class="topbar"><div><b>CORE 10.3</b><small>PROFILES + RANKING</small></div><div class="brand">LIVE ARENA™<small>PERSISTENT UNIVERSE</small></div><div class="rightTop"><b id="connectionState">CONNECTING</b><small>REALTIME SERVER</small></div></header>
<main class="main"><aside class="panel"><h3>🌍 WORLD</h3><div class="stat"><span>👥 Players</span><b id="globalPlayers">0</b></div><div class="stat"><span>⚡ Energy</span><b id="worldEnergy">0%</b></div><div class="stat"><span>👹 Boss HP</span><b id="globalBossHp">100%</b></div><h3>🏰 GUILDS</h3><div class="guild"><b>🐉 Dragons</b><span id="dragons">0%</span></div><div class="guild"><b>🔥 Phoenix</b><span id="phoenix">0%</span></div></aside>
<section class="stage"><div class="realm" id="realmName">ROYAL ARENA</div><div class="aura"></div><div class="mask-zone"><img src="assets/images/arena-master-mask.png"></div><div class="boss-panel" id="bossPanel"><div class="boss-title">TITAN OMEGA</div><div class="boss-bar"><span id="bossBar"></span></div><small id="bossPhase">SLEEPING</small></div></section>
<aside class="panel"><h3>🏆 GLOBAL RANKING</h3><div id="ranking"></div><h3>📡 FEED</h3><div id="feed" class="feed"></div></aside></main>
<section class="controls"><button onclick="sendEvent('like')">❤️ Like</button><button onclick="sendEvent('gift')">🎁 Gift</button><button onclick="sendEvent('attackBoss')">⚔ Attack</button><button onclick="sendEvent('globalBoss')">👹 Boss</button><button onclick="sendEvent('guildWar')">⚔ Guild War</button><button onclick="sendEvent('realm')">🌌 Realm</button></section><div class="toast" id="toast">LIVE ARENA</div></div><script src="engine/client.js"></script></body></html>
